<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>NFT Art Gallery</title>

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins', sans-serif;
      background:
      radial-gradient(circle at top left,#7d0f57,#0a0633 40%,#050505 80%);
      min-height:100vh;
      overflow-x:hidden;
      color:white;
      position:relative;
    }

    /* SMALL BACKGROUND DOTS */

    body::before,
    body::after{
      content:'';
      position:absolute;
      width:10px;
      height:10px;
      background:white;
      border-radius:50%;
      opacity:0.7;
    }

    body::before{
      top:40px;
      left:40px;
    }

    body::after{
      right:40px;
      bottom:80px;
    }

    /* MAIN CONTAINER */

    .container{
      width:100%;
      min-height:100vh;
      padding:50px 60px;
      position:relative;
    }

    /* HEADER */

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:50px;
      position:relative;
    }

    .header h2{
      font-size:36px;
      font-weight:500;
    }

    .header a{
      color:white;
      text-decoration:none;
      font-size:18px;
    }

    /* GRID */

    .gallery{
      width:100%;

      display:flex;
      justify-content:center;
      align-items:flex-start;
      gap:35px;

      flex-wrap:wrap;

      position:relative;
    }

    /* CARD */

    .card{
      width:260px;
      background:rgba(255,255,255,0.12);

      border-radius:28px;

      padding:18px;

      position:relative;

      backdrop-filter:blur(8px);

      transition:0.3s;

      border:1px solid rgba(255,255,255,0.08);
    }

    .card:hover{
      transform:translateY(-10px);
      box-shadow:0 0 25px rgba(194,109,255,0.35);
    }

    /* IMAGE */

    .image-box{
      width:100%;
      height:220px;

      border-radius:20px;
      overflow:hidden;

      position:relative;
    }

    .image-box img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* CONTENT */

    .content{
      margin-top:18px;
      position:relative;
    }

    .top-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .top-row h3{
      font-size:24px;
      font-weight:500;
    }

    .likes{
      font-size:14px;
      color:#d5d5d5;
    }

    /* BUTTON */

    .bid-btn{
      width:100%;
      margin-top:22px;

      padding:14px;

      border-radius:35px;

      border:2px solid #c26dff;

      background:transparent;

      color:white;

      font-size:22px;
      font-weight:500;

      cursor:pointer;

      transition:0.3s;
    }

    .bid-btn:hover{
      background:#c26dff;
    }

    /* FLOATING DOTS */

    .dot{
      width:8px;
      height:8px;
      background:white;
      border-radius:50%;
      position:absolute;
      opacity:0.7;
    }

    .dot1{
      top:180px;
      right:60px;
    }

    .dot2{
      left:20px;
      bottom:120px;
    }

    .dot3{
      right:20px;
      bottom:140px;
    }

    /* RESPONSIVE */

    @media(max-width:900px){

      .container{
        padding:40px 25px;
      }

      .header h2{
        font-size:28px;
      }

      .gallery{
        gap:25px;
      }
    }

    @media(max-width:600px){

      .header{
        flex-direction:column;
        gap:10px;
        align-items:flex-start;
      }

      .card{
        width:100%;
        max-width:320px;
      }

      .bid-btn{
        font-size:18px;
      }
    }

  </style>
</head>

<body>
